<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Project report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; width: 100%; }
body { font-family: system-ui, sans-serif; padding: 16px; }
h1 { font-size: 1.15rem; font-weight: 600; margin: 0 0 12px; }
.grid {
	display: flex;
	flex-direction: column;
	gap: 24px;
	width: 100%;
	align-items: stretch;
}
.slot {
	border: 1px solid #e0e0e0;
	border-radius: 8px;
	padding: 10px 12px 14px;
	background: #fafafa;
	width: 100%;
}
.slot h3 { font-size: 0.95rem; font-weight: 600; margin: 0 0 8px; }
.chart-wrap {
	position: relative;
	width: 100%;
	height: 340px;
	max-width: 100%;
}
.chart-wrap canvas { display: block; max-width: 100%; }
.chart-placeholder { color: #666; font-size: 0.9rem; padding: 20px 8px; text-align: center; }
.slot .eta-wrap { margin-top: 10px; }
.slot .eta-wrap h4 { font-size: 0.85rem; font-weight: 600; margin: 0 0 6px; }
.slot .eta-wrap table { border-collapse: collapse; font-size: 0.75rem; width: 100%; }
.slot .eta-wrap th, .slot .eta-wrap td { border: 1px solid #ccc; padding: 4px 6px; text-align: left; }
.slot .eta-wrap th { background: #eee; }
.slot .eta-wrap .muted { color: #666; font-size: 0.8rem; }
.holders-section { margin-top: 28px; }
.holders-section h2 { font-size: 1rem; font-weight: 600; margin: 0 0 8px; }
.holders-section h3 { font-size: 0.9rem; font-weight: 600; margin: 20px 0 8px; }
.section-meta { font-size: 0.85rem; color: #444; margin: 0 0 10px; }
.holders-scroll { overflow-x: auto; border: 1px solid #e0e0e0; border-radius: 8px; }
.holders-section table { border-collapse: collapse; font-size: 0.8rem; width: 100%; }
.holders-section th, .holders-section td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; vertical-align: top; }
.holders-section th { background: #eee; white-space: nowrap; }
.holders-section td.num { text-align: right; white-space: nowrap; }
.holders-section td.address { font-family: ui-monospace, monospace; font-size: 0.75rem; }
.holders-section td.tokens { min-width: 200px; max-width: 420px; }
.holders-section td.tier { white-space: nowrap; }
</style>
</head>
<body>
<h1 id="project-title">Project report</h1>

<div id="grid" class="grid" aria-label="Token charts"></div>

<section id="holders-section" class="holders-section" aria-label="Project holders">
	<h2>Holders</h2>
	<h3>Tier distribution</h3>
	<table id="tier-stats-table">
		<thead>
			<tr>
				<th>Tier</th>
				<th>Count</th>
				<th>% holders</th>
				<th>% supply</th>
			</tr>
		</thead>
		<tbody id="tier-stats-body"></tbody>
	</table>
	<h3>Top holders</h3>
	<p id="holders-meta" class="section-meta"></p>
	<div class="holders-scroll">
		<table id="holders-table">
			<thead>
				<tr>
					<th>#</th>
					<th>Address</th>
					<th>Token names</th>
					<th>Balance</th>
					<th>% supply</th>
					<th>Tier</th>
				</tr>
			</thead>
			<tbody id="holders-body"></tbody>
		</table>
	</div>
</section>

<script type="application/json" id="project-data">__PROJECT_DATA_JSON__</script>

<script>
(function () {
	const raw = document.getElementById("project-data").textContent;
	let projectData;
	try {
		projectData = JSON.parse(raw);
	} catch (e) {
		document.body.innerHTML = "<p>Invalid JSON in #project-data.</p>";
		return;
	}

	if (projectData.name) {
		document.title = projectData.name;
		document.getElementById("project-title").textContent = projectData.name;
	}

	const allTokens = Array.isArray(projectData.tokens) ? projectData.tokens : [];
	const allHolders = Array.isArray(projectData.holders) ? projectData.holders : [];
	const tierStats = Array.isArray(projectData.tierStats) ? projectData.tierStats : [];
	const holdersTop = typeof projectData.holdersTop === "number" && projectData.holdersTop > 0
		? projectData.holdersTop
		: allHolders.length;
	const grid = document.getElementById("grid");
	const chartInstances = [];

	function escapeHtml(s) {
		if (s == null || s === "") return "";
		return String(s)
			.replace(/&/g, "&amp;")
			.replace(/</g, "&lt;")
			.replace(/>/g, "&gt;")
			.replace(/"/g, "&quot;");
	}

	function renderETAsInto(container, chartData) {
		const rows = chartData.etas;
		if (!rows || rows.length === 0) {
			container.innerHTML = "<h4>ETA</h4><p class=\"muted\">No ETA rows.</p>";
			return;
		}
		const times = rows.map(function (r) { return r.date; }).filter(Boolean).sort();
		let band = "";
		if (times.length >= 2) {
			band = "<p class=\"muted\">Band: <strong>" + escapeHtml(times[0]) + "</strong> … <strong>" + escapeHtml(times[times.length - 1]) + "</strong></p>";
		}
		const body = rows.map(function (r) {
			return "<tr><td>" + escapeHtml(r.window) + "</td><td>" + escapeHtml(r.rate) + "</td><td>" + r.days + "</td><td>" + escapeHtml(r.date) + "</td></tr>";
		}).join("");
		container.innerHTML =
			"<h4>ETA</h4>" +
			band +
			"<table><thead><tr><th>Window</th><th>Avg Δ</th><th>Days</th><th>Date</th></tr></thead><tbody>" +
			body +
			"</tbody></table>";
	}

	function chartOptions() {
		return {
			responsive: true,
			maintainAspectRatio: false,
			interaction: { mode: "index", intersect: false },
			scales: {
				x: { ticks: { maxTicksLimit: 24 } },
				y: {
					type: "linear",
					position: "left",
					beginAtZero: true,
					title: { display: true, text: "Daily Δ", font: { size: 10 } }
				},
				y1: {
					type: "linear",
					position: "right",
					beginAtZero: true,
					grid: { drawOnChartArea: false },
					title: { display: true, text: "Cumulative", font: { size: 10 } }
				}
			}
		};
	}

	function renderHolders() {
		const section = document.getElementById("holders-section");
		if (allHolders.length === 0) {
			section.hidden = true;
			return;
		}

		const shown = Math.min(holdersTop, allHolders.length);
		document.getElementById("holders-meta").textContent =
			"Showing " + shown + " of " + allHolders.length + " holders (by total balance).";

		const body = document.getElementById("holders-body");
		body.innerHTML = allHolders.slice(0, holdersTop).map(function (h, i) {
			return "<tr>" +
				"<td class=\"num\">" + (i + 1) + "</td>" +
				"<td class=\"address\">" + escapeHtml(h.address) + "</td>" +
				"<td class=\"tokens\">" + escapeHtml((h.tokenNames || []).join(", ")) + "</td>" +
				"<td class=\"num\">" + escapeHtml(h.balance) + "</td>" +
				"<td class=\"num\">" + (h.supplyPct != null ? h.supplyPct.toFixed(2) : "0.00") + "%</td>" +
				"<td class=\"tier\">" + escapeHtml(h.tier) + "</td>" +
				"</tr>";
		}).join("");

		const tierBody = document.getElementById("tier-stats-body");
		tierBody.innerHTML = tierStats.map(function (s) {
			return "<tr>" +
				"<td class=\"tier\">" + escapeHtml(s.name) + "</td>" +
				"<td class=\"num\">" + s.count + "</td>" +
				"<td class=\"num\">" + s.holdersPct.toFixed(1) + "%</td>" +
				"<td class=\"num\">" + s.supplyPct.toFixed(2) + "%</td>" +
				"</tr>";
		}).join("");
	}

	function renderCharts() {
		grid.innerHTML = "";

		if (allTokens.length === 0) {
			grid.innerHTML = "<p class=\"chart-placeholder\">No tokens loaded</p>";
			return;
		}

		allTokens.forEach(function (token) {
			const slot = document.createElement("div");
			slot.className = "slot";
			const title = document.createElement("h3");
			title.textContent = token && token.title ? token.title : "—";
			slot.appendChild(title);

			const wrap = document.createElement("div");
			wrap.className = "chart-wrap";
			const canvas = document.createElement("canvas");
			wrap.appendChild(canvas);
			slot.appendChild(wrap);

			const etaWrap = document.createElement("div");
			etaWrap.className = "eta-wrap";
			slot.appendChild(etaWrap);
			grid.appendChild(slot);

			if (!token || !token.labels || token.labels.length === 0) {
				wrap.innerHTML = "<div class=\"chart-placeholder\">No series</div>";
				etaWrap.innerHTML = "<h4>ETA</h4><p class=\"muted\">—</p>";
				return;
			}

			const ch = new Chart(canvas, {
				type: "line",
				data: {
					labels: token.labels,
					datasets: [
						{
							label: "Daily Δ",
							data: token.daily,
							borderColor: "rgb(75, 192, 192)",
							backgroundColor: "rgba(75, 192, 192, 0.2)",
							tension: 0,
							stepped: "before",
							fill: false,
							yAxisID: "y"
						},
						{
							label: "Cumulative",
							data: token.cumulative,
							borderColor: "rgb(255, 99, 132)",
							tension: 0.05,
							fill: false,
							yAxisID: "y1"
						}
					]
				},
				options: chartOptions()
			});
			chartInstances.push(ch);
			renderETAsInto(etaWrap, token);
		});
	}

	renderHolders();
	renderCharts();
})();
</script>
</body>
</html>
