<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Daily series</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<style>
body { font-family: system-ui, sans-serif; margin: 16px; }
h1 { font-size: 1.1rem; font-weight: 600; }
.chart-wrap {
	position: relative;
	width: 100%;
	height: 420px;
	max-width: 100%;
}
.chart-wrap canvas { display: block; max-width: 100%; }
#eta-section { margin-top: 1.5rem; }
#eta-section h2 { font-size: 1rem; font-weight: 600; margin: 0 0 0.5rem; }
#eta-section table { border-collapse: collapse; font-size: 0.9rem; }
#eta-section th, #eta-section td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
#eta-section th { background: #f5f5f5; }
#eta-section .muted { color: #666; font-size: 0.9rem; }
</style>
</head>
<body>
<h1 id="title"></h1>
<div class="chart-wrap"><canvas id="c"></canvas></div>
<section id="eta-section" aria-label="ETA estimates"></section>
<script>
const chartData = __CHART_DATA_JSON__;
document.getElementById("title").textContent = chartData.title || "Daily series";
const ctx = document.getElementById("c");
new Chart(ctx, {
  type: "line",
  data: {
    labels: chartData.labels,
    datasets: [
      {
        label: "Daily Δ (tokens)",
        data: chartData.daily,
        borderColor: "rgb(75, 192, 192)",
        backgroundColor: "rgba(75, 192, 192, 0.2)",
        tension: 0,
        stepped: "before",
        fill: false,
        yAxisID: "y"
      },
      {
        label: "Cumulative (tokens)",
        data: chartData.cumulative,
        borderColor: "rgb(255, 99, 132)",
        tension: 0.05,
        fill: false,
        yAxisID: "y1"
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    scales: {
      x: { ticks: { maxTicksLimit: 14 } },
      y: {
        type: "linear",
        position: "left",
        beginAtZero: true,
        title: { display: true, text: "Daily Δ" }
      },
      y1: {
        type: "linear",
        position: "right",
        beginAtZero: true,
        grid: { drawOnChartArea: false },
        title: { display: true, text: "Cumulative" }
      }
    }
  }
});

(function renderETAs() {
  const sec = document.getElementById("eta-section");
  const rows = chartData.etas;
  if (!rows || rows.length === 0) {
    sec.innerHTML = "<h2>ETA (extrapolation)</h2><p class=\"muted\">No ETA rows (not enough data or could not compute).</p>";
    return;
  }
  const times = rows.map((r) => r.date).filter(Boolean).sort();
  let band = "";
  if (times.length >= 2) {
    band = "<p class=\"muted\">Band (earliest…latest date): <strong>" + times[0] + "</strong> … <strong>" + times[times.length - 1] + "</strong></p>";
  }
  let body = rows.map(function (r) {
    return "<tr><td>" + escapeHtml(r.window) + "</td><td>" + escapeHtml(r.rate) + "</td><td>" + r.days + "</td><td>" + escapeHtml(r.date) + "</td></tr>";
  }).join("");
  sec.innerHTML =
    "<h2>ETA (moving-average extrapolation)</h2>" +
    band +
    "<table><thead><tr><th>Window</th><th>Avg Δ (tokens/day)</th><th>Days to target</th><th>ETA (UTC date)</th></tr></thead><tbody>" +
    body +
    "</tbody></table>";
})();

function escapeHtml(s) {
  if (s == null || s === "") return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>
</body>
</html>
